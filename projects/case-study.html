<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Case Study | Chaithra Poojary</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Allura&display=swap"
      rel="stylesheet"
    />
    <link id="dynamic-favicon" rel="icon" href="" />
    <link rel="stylesheet" href="../styles.css" />
  </head>
  <body class="case-body" data-theme="midnight-orchid" data-page="case-study" data-scene="home" data-case-template="ai-saas">
    <div class="global-background" aria-hidden="true">
      <div class="bg-layer bg-sky"></div>
      <div class="bg-layer bg-celestial"></div>
      <div class="bg-layer bg-stars"></div>
      <div class="bg-layer bg-hills"></div>
      <div class="bg-layer bg-trees"></div>
      <div class="bg-layer bg-fog"></div>
      <div class="bg-layer bg-petals">
        <span class="petal petal-1"></span>
        <span class="petal petal-2"></span>
        <span class="petal petal-3"></span>
        <span class="petal petal-4"></span>
        <span class="petal petal-5"></span>
        <span class="petal petal-6"></span>
        <span class="petal petal-7"></span>
        <span class="petal petal-8"></span>
      </div>
    </div>
    <header class="site-header">
      <nav class="navbar container" aria-label="Primary">
        <a class="brand" data-admin-logo href="/#home" aria-label="Chaithra Poojary home">
          <span class="brand-mark" aria-hidden="true">
            <svg class="brand-mark-svg" viewBox="0 0 64 64" role="img" aria-hidden="true">
              <defs>
                <linearGradient id="brand-accent-case" x1="10%" y1="10%" x2="90%" y2="90%">
                  <stop offset="0%" stop-color="#7A5CFF"></stop>
                  <stop offset="100%" stop-color="#5A8BFF"></stop>
                </linearGradient>
              </defs>
              <path class="brand-grid" d="M12 12H52M12 24H52M12 36H52M12 48H52M12 12V52M24 12V52M36 12V52M48 12V52"></path>
              <rect class="brand-frame" x="18" y="16" width="24" height="30" rx="4"></rect>
              <path class="brand-frame" d="M22 22H38"></path>
              <path class="brand-frame" d="M22 28H33"></path>
              <path class="brand-accent" d="M39 34L47 26"></path>
              <path class="brand-accent" d="M41 24H49V32"></path>
              <circle class="brand-accent-dot" cx="24" cy="38" r="2.5"></circle>
            </svg>
          </span>
          <span class="brand-lockup">
            <span class="brand-signature" data-brand-name>Chaithra Poojary</span>
            <span class="brand-caption">Product Designer</span>
          </span>
        </a>
        <div class="nav-actions">
          <button
            class="menu-button"
            type="button"
            aria-expanded="false"
            aria-controls="mobile-menu"
            data-menu-toggle
          >
            <span class="menu-button-label">Menu</span>
            <span class="menu-button-orb" aria-hidden="true">
              <span></span>
              <span></span>
            </span>
          </button>
          <div class="theme-toggle" role="group" aria-label="Theme switcher">
            <button class="theme-chip" type="button" data-theme-target="light">
              <span class="theme-chip-icon theme-chip-sun" aria-hidden="true"></span>
              <span class="theme-chip-label">Light</span>
            </button>
            <button class="theme-chip" type="button" data-theme-target="dark">
              <span class="theme-chip-icon theme-chip-moon" aria-hidden="true"></span>
              <span class="theme-chip-label">Dark</span>
            </button>
            <button class="theme-chip" type="button" data-theme-target="midnight-orchid">
              <span class="theme-chip-icon theme-chip-orchid" aria-hidden="true"></span>
              <span class="theme-chip-label">Orchid</span>
            </button>
          </div>
        </div>
      </nav>
      <div class="mobile-menu-wrap container" id="mobile-menu" data-mobile-menu hidden>
        <div class="mobile-menu glass-card">
          <div class="mobile-menu-header">
            <p class="eyebrow">Explore</p>
            <button class="mobile-menu-close" type="button" data-menu-close aria-label="Close menu">
              Close
            </button>
          </div>
          <div class="mobile-menu-links">
            <a href="/#home">Home</a>
            <a href="/#about">About</a>
            <a href="/#projects">Projects</a>
            <a href="/#experience">Experience</a>
            <a href="/#contact">Contact</a>
          </div>
          <div class="mobile-theme-toggle theme-toggle" role="group" aria-label="Theme switcher">
            <button class="theme-chip" type="button" data-theme-target="light">
              <span class="theme-chip-icon theme-chip-sun" aria-hidden="true"></span>
              <span class="theme-chip-label">Light</span>
            </button>
            <button class="theme-chip" type="button" data-theme-target="dark">
              <span class="theme-chip-icon theme-chip-moon" aria-hidden="true"></span>
              <span class="theme-chip-label">Dark</span>
            </button>
            <button class="theme-chip" type="button" data-theme-target="midnight-orchid">
              <span class="theme-chip-icon theme-chip-orchid" aria-hidden="true"></span>
              <span class="theme-chip-label">Orchid</span>
            </button>
          </div>
        </div>
      </div>
    </header>

    <main class="case-main container">
      <a class="back-link" href="/#projects">← Back to Projects</a>
      <section class="case-hero reveal">
        <p class="eyebrow">Case Study</p>
        <h1 id="case-title">Project</h1>
        <p class="case-intro" id="case-intro"></p>
        <div class="case-cover">
          <img id="case-image" src="../assets/project-atlas.svg" alt="Project cover" />
        </div>
      </section>

      <section class="case-grid">
        <aside class="case-sidebar glass-card reveal">
          <dl>
            <dt>Role</dt>
            <dd id="case-role"></dd>
            <dt>Scope</dt>
            <dd id="case-scope"></dd>
            <dt>Timeline</dt>
            <dd id="case-timeline"></dd>
            <dt>Outcome</dt>
            <dd id="case-outcome"></dd>
          </dl>
        </aside>

        <div class="case-content" id="case-content"></div>
      </section>
    </main>

    <script src="../portfolio-data.js"></script>
    <script src="../script.js"></script>
  </body>
</html>
